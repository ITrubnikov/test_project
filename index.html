<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e3e;
      --accent: #7c6aff;
      --accent-dim: #4b3fcf;
      --text: #e8e8f0;
      --text-dim: #7878a0;
      --danger: #ff5c6a;
      --success: #4cde9c;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 1.5rem;
      color: var(--accent);
    }

    .container { width: 100%; max-width: 640px; }

    /* Add form */
    .add-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .add-form input {
      flex: 1;
      padding: 0.7rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus { border-color: var(--accent); }

    .add-form input::placeholder { color: var(--text-dim); }

    .btn {
      padding: 0.7rem 1.2rem;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:hover { opacity: 0.88; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-danger  { background: var(--danger);  color: #fff; }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.4rem 1rem;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.2rem;
      font-size: 0.82rem;
      color: var(--text-dim);
    }

    .stats span b { color: var(--text); }

    /* Task list */
    .task-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      transition: border-color 0.2s, opacity 0.2s;
      animation: slideIn 0.18s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item.done { opacity: 0.5; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--text-dim); }

    /* Checkbox */
    .task-check {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .task-check.checked { background: var(--success); border-color: var(--success); }

    .task-check.checked::after {
      content: '✓';
      font-size: 0.8rem;
      color: #000;
      font-weight: 700;
    }

    .task-text {
      flex: 1;
      font-size: 0.97rem;
      word-break: break-word;
      outline: none;
    }

    .task-text[contenteditable="true"]:focus {
      text-decoration: underline dotted var(--accent);
    }

    .task-date {
      font-size: 0.75rem;
      color: var(--text-dim);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .task-del {
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1.1rem;
      flex-shrink: 0;
      padding: 0 4px;
      transition: color 0.15s;
    }

    .task-del:hover { color: var(--danger); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-dim);
      font-size: 0.95rem;
    }

    /* Clear done */
    .actions {
      margin-top: 1rem;
      display: flex;
      justify-content: flex-end;
    }

    .btn-sm {
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✦ Task Manager</h1>

    <form class="add-form" id="addForm">
      <input type="text" id="taskInput" placeholder="Новая задача…" autocomplete="off" />
      <button type="submit" class="btn btn-primary">Добавить</button>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Все</button>
      <button class="filter-btn" data-filter="active">Активные</button>
      <button class="filter-btn" data-filter="done">Выполненные</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="task-list" id="taskList"></div>

    <div class="actions">
      <button class="btn btn-danger btn-sm" id="clearDone">Очистить выполненные</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'tm_tasks_v1';
    let tasks = [];
    let filter = 'all';

    function load() {
      try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { tasks = []; }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function fmtDate(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
    }

    function render() {
      const list = document.getElementById('taskList');
      const stats = document.getElementById('stats');

      const visible = filter === 'all' ? tasks
        : filter === 'active' ? tasks.filter(t => !t.done)
        : tasks.filter(t => t.done);

      const total  = tasks.length;
      const done   = tasks.filter(t => t.done).length;
      const active = total - done;

      stats.innerHTML = `<span>Всего: <b>${total}</b></span><span>Активных: <b>${active}</b></span><span>Выполнено: <b>${done}</b></span>`;

      if (visible.length === 0) {
        list.innerHTML = `<div class="empty">Задач нет (^_^)</div>`;
        return;
      }

      list.innerHTML = '';
      visible.forEach(task => {
        const item = document.createElement('div');
        item.className = 'task-item' + (task.done ? ' done' : '');

        const check = document.createElement('div');
        check.className = 'task-check' + (task.done ? ' checked' : '');
        check.title = task.done ? 'Отметить активной' : 'Отметить выполненной';
        check.addEventListener('click', () => toggle(task.id));

        const text = document.createElement('span');
        text.className = 'task-text';
        text.textContent = task.text;
        text.contentEditable = 'true';
        text.addEventListener('blur', () => {
          const newText = text.textContent.trim();
          if (newText) { task.text = newText; save(); }
          else { text.textContent = task.text; }
        });
        text.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); text.blur(); }
        });

        const date = document.createElement('span');
        date.className = 'task-date';
        date.textContent = fmtDate(task.created);

        const del = document.createElement('button');
        del.className = 'task-del';
        del.title = 'Удалить';
        del.textContent = '✕';
        del.addEventListener('click', () => remove(task.id));

        item.append(check, text, date, del);
        list.appendChild(item);
      });
    }

    function addTask(text) {
      tasks.unshift({ id: uid(), text, done: false, created: Date.now() });
      save(); render();
    }

    function toggle(id) {
      const t = tasks.find(t => t.id === id);
      if (t) { t.done = !t.done; save(); render(); }
    }

    function remove(id) {
      tasks = tasks.filter(t => t.id !== id);
      save(); render();
    }

    // Events
    document.getElementById('addForm').addEventListener('submit', e => {
      e.preventDefault();
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (text) { addTask(text); input.value = ''; }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    document.getElementById('clearDone').addEventListener('click', () => {
      tasks = tasks.filter(t => !t.done);
      save(); render();
    });

    load(); render();
  </script>
</body>
</html>
